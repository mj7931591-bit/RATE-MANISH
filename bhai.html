<!DOCTYPE html>
<html>
<head>
  <title>Rate Manish 😎🔥</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
      color: white;
      text-align: center;
    }

    .container {
      max-width: 400px;
      margin: 30px auto;
      padding: 20px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    h2 { margin-bottom: 10px; }

    .stars span {
      font-size: 30px;
      cursor: pointer;
    }

    input {
      width: 90%;
      padding: 8px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      margin-top: 5px;
      cursor: pointer;
      background: #ff9800;
      color: white;
    }

    .comment {
      background: rgba(255,255,255,0.2);
      padding: 8px;
      margin: 5px;
      border-radius: 8px;
      text-align: left;
    }

    .like {
      cursor: pointer;
      color: yellow;
    }

    .dark {
      background: black;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Rate Manish 😎🔥</h2>

  <div class="stars">
    <span onclick="rate(1)">⭐</span>
    <span onclick="rate(2)">⭐</span>
    <span onclick="rate(3)">⭐</span>
    <span onclick="rate(4)">⭐</span>
    <span onclick="rate(5)">⭐</span>
  </div>

  <h3 id="avg"></h3>

  <hr>

  <input type="text" id="name" placeholder="Apna naam">
  <input type="text" id="comment" placeholder="Comment likho">

  <button onclick="addComment()">Submit</button>
  <button onclick="toggleDark()">🌙 Dark Mode</button>

  <div id="comments"></div>
</div>

<script>
let ratings = JSON.parse(localStorage.getItem("ratings")) || [];
let comments = JSON.parse(localStorage.getItem("comments")) || [];

function rate(val){
  ratings.push(val);
  localStorage.setItem("ratings", JSON.stringify(ratings));
  showAvg();
}

function showAvg(){
  if(ratings.length==0) return;
  let avg = (ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(1);
  document.getElementById("avg").innerText = 
    "⭐ Rating: " + avg + " (" + ratings.length + " votes)";
}

function addComment(){
  let name = document.getElementById("name").value;
  let text = document.getElementById("comment").value;

  if(name=="" || text=="") return;

  let obj = {name, text, likes:0};
  comments.push(obj);

  localStorage.setItem("comments", JSON.stringify(comments));

  document.getElementById("name").value="";
  document.getElementById("comment").value="";

  showComments();
}

function like(i){
  comments[i].likes++;
  localStorage.setItem("comments", JSON.stringify(comments));
  showComments();
}

function showComments(){
  let div = document.getElementById("comments");
  div.innerHTML="";

  comments.forEach((c,i)=>{
    div.innerHTML += `
      <div class="comment">
        <b>${c.name}</b><br>
        ${c.text}<br>
        <span class="like" onclick="like(${i})">👍 ${c.likes}</span>
      </div>
    `;
  });
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

showAvg();
showComments();
</script>

</body>
</html>
